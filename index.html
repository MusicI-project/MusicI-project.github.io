<!DOCTYPE html>
<html lang="ja" xml:lang="ja" dir="ltr" prefix="og: https://ogp.me/ns#" style="opacity: 1;">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="author" content="ねこナビくん">
    <meta name="description" content="私、ねこナビくんの開発しているオンラインDAWページです。">
    <meta name="color-scheme" content="only light">
    <title>Music I-実験</title>
    <link rel="profile" href="https://gmpg.org/xfn/11">
    <link rel="preload" href="style.css" as="style">
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;900&amp;display=swap" as="style">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/MI.png">

    <link rel="canonical" href="https://MusicI-project.github.io/">

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <div class="header_contents">
        <div class="header_section">
          <p class="header_p">プロジェクト名</p>
          <input type="search" id="title" name="title" class="header_input" />
        </div>
        <div class="header_section">
          <p class="header_p">テンポ</p>
          <input type="number" max="500" min="5" id="BPM" name="BPM" class="header_input" />
        </div>
        <div class="header_section">
          <p class="header_p">拍子</p>
          <select name="beat_1">
            <option value="4">4</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
          </select>
          <p>/</p>
          <select name="beat_2">
            <option value="4">4</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="8">8</option>
            <option value="16">16</option>
            <option value="32">32</option>
            <option value="64">64</option>
          </select>
      </div>
    </header>
  </body>
</html>
